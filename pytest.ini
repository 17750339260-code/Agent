[pytest]
testpaths = test_tts
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 关闭全局 pytest-result-log 插件的 Start/End/PASSED 日志（见 D:\StudyInformation\Python\Lib\site-packages\pytest_result_log）
result_log_enable = false
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    performance: performance related tests
    functional: functional tests
    integration: integration tests
    asr: 标记所有自动语音识别(ASR)相关的测试用例。
    stress: 标记所有压力、并发或性能测试。
;log_cli = true
;log_cli_level = INFO
;log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
;log_cli_date_format = %Y-%m-%d %H:%M:%S